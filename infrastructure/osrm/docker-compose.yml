version: '3.8'

services:
  osrm-backend:
    image: osrm/osrm-backend
    container_name: osrm-surabaya
    restart: always
    ports:
      # ⚠️  Port 5000 is taken by MLflow UI (mlflow ui default port).
      # OSRM runs on host port 5001 → container port 5000.
      - "5001:5000"
    volumes:
      # Mount the current directory (infrastructure/osrm/) where the
      # java-latest.osrm* files actually live.  The ./osrm-data subfolder
      # is empty and was the original bug.
      - ./:/data
    # The java-latest.osrm.hsgr file proves these were preprocessed with CH
    # (Contraction Hierarchies), NOT MLD. Using --algorithm mld causes the
    # "Did you load the right dataset?" crash.
    command: "osrm-routed --algorithm ch /data/java-latest.osrm"

# =========================================================================================
# OSRM PRE-PROCESSING INSTRUCTIONS
# =========================================================================================
# If you haven't processed the map data yet, you need to download a .osm.pbf file 
# (e.g., for Surabaya/East Java from Geofabrik) and put it in the `./osrm-data` folder.
# Rename it to `surabaya.osm.pbf` for consistency.
#
# Then, run the following Docker commands from this directory to pre-process the map:
#
# 1. Extract the road network (using the car profile):
# docker run -t -v "${PWD}/osrm-data:/data" osrm/osrm-backend osrm-extract -p /opt/car.lua /data/surabaya.osm.pbf
#
# 2. Partition the graph (for MLD algorithm):
# docker run -t -v "${PWD}/osrm-data:/data" osrm/osrm-backend osrm-partition /data/surabaya.osrm
#
# 3. Customize the cells (for MLD algorithm):
# docker run -t -v "${PWD}/osrm-data:/data" osrm/osrm-backend osrm-customize /data/surabaya.osrm
#
# After running those three steps, you can start the service normally with:
# docker-compose up -d
# =========================================================================================
